<VirtualHost *:80>
    ServerName {{.FQDN}}
    ServerAdmin {{.AdminEmail}}

    Redirect permanent / https://{{.FQDN}}/

    ErrorLog {{.LogsDir}}/http-errors.log
    CustomLog {{.LogsDir}}/http-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName {{.FQDN}}
    ServerAdmin {{.AdminEmail}}
{{if ne "" .Subdir}}
    DocumentRoot {{.RootDir}}
    Alias {{.SlashSubdir}}/ {{.BaseDir}}/
    RedirectMatch 301 ^{{.SlashSubdir}}$ {{.SlashSubdir}}/
    RedirectMatch 301 ^/$ {{.SlashSubdir}}/
{{else}}
    DocumentRoot {{.BaseDir}}
{{end}}
    DirectoryIndex index.php index.html

    <Directory {{.BaseDir}}>
        Require all granted
        AllowOverride All
        Options FollowSymLinks MultiViews
        <IfModule mod_dav.c>
            Dav off
        </IfModule>
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:{{.SocketPath}}|fcgi://localhost/"
    </FilesMatch>

    ErrorLog {{.LogsDir}}/errors.log
    CustomLog {{.LogsDir}}/access.log combined

    # Security Headers
    Header always set Strict-Transport-Security "max-age=15768000; includeSubDomains; preload"
    Header always set Referrer-Policy "no-referrer"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    # .well-known Redirects for Nextcloud
    Redirect 301 /.well-known/carddav         {{.SlashSubdir}}/remote.php/dav
    Redirect 301 /.well-known/caldav          {{.SlashSubdir}}/remote.php/dav
    Redirect 301 /.well-known/webfinger       {{.SlashSubdir}}/index.php/.well-known/webfinger
    Redirect 301 /.well-known/nodeinfo        {{.SlashSubdir}}/index.php/.well-known/nodeinfo
    Redirect 301 /.well-known/host-meta       {{.SlashSubdir}}/index.php/.well-known/host-meta
    Redirect 301 /.well-known/host-meta.json  {{.SlashSubdir}}/index.php/.well-known/host-meta.json

    <LocationMatch "^{{.SlashSubdir}}/(index|remote)\.php">
        Header always set Cache-Control "no-store"
    </LocationMatch>

    SSLEngine on
    SSLCertificateFile {{.CertDir}}/fullchain.pem
    SSLCertificateKeyFile {{.CertDir}}/privkey.pem
</VirtualHost>

