<VirtualHost *:80>
{{- if .IsWWW}}
    ServerName  {{.DomainName}}
    ServerAlias {{.ServerAlias}}
    Redirect permanent / https://{{.DomainName}}/
{{else}}
    ServerName {{.FQDN}}
    Redirect permanent / https://{{.FQDN}}/
{{end}}
    ServerAdmin {{.AdminEmail}}

    ErrorLog {{.LogsDir}}/http-errors.log
    CustomLog {{.LogsDir}}/http-access.log combined
</VirtualHost>

<VirtualHost *:443>
{{- if .IsWWW}}
    ServerName  {{.DomainName}}
    ServerAlias {{.ServerAlias}}
{{else}}
    ServerName {{.FQDN}}
{{end}}
    ServerAdmin {{.AdminEmail}}

    DocumentRoot {{.BaseDir}}
    DirectoryIndex index.php

    <Directory {{.BaseDir}}>
        Require all granted
        AllowOverride All
        Options FollowSymLinks
        Options -Indexes
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:{{.SocketPath}}|fcgi://localhost/"
    </FilesMatch>

    ErrorLog {{.LogsDir}}/errors.log
    CustomLog {{.LogsDir}}/access.log combined

    # Security Headers
    Header always set Strict-Transport-Security "max-age=15768000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    SSLEngine on
    SSLCertificateFile {{.CertDir}}/fullchain.pem
    SSLCertificateKeyFile {{.CertDir}}/privkey.pem
</VirtualHost>

