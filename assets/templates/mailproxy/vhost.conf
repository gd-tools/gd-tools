<VirtualHost *:80>
    ServerName autoconfig.{{.Domain}}
    ServerAlias autodiscover.{{.Domain}} mta-sts.{{.Domain}}
    ServerAdmin {{.SysAdmin}}

    Redirect permanent / https://autoconfig.{{.Domain}}/

    ErrorLog {{.LogsDir}}/http-errors.log
    CustomLog {{.LogsDir}}/http-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName autoconfig.{{.Domain}}
    ServerAlias autodiscover.{{.Domain}} mta-sts.{{.Domain}}
    ServerAdmin {{.SysAdmin}}

    DocumentRoot {{.RootDir}}

    RewriteEngine On
    RewriteRule (?i)^/autodiscover/autodiscover\.xml$ /autodiscover/autodiscover.xml [L]

    SSLEngine on
    SSLCertificateFile      {{.CertDir}}/fullchain.pem
    SSLCertificateKeyFile   {{.CertDir}}/privkey.pem

    <Directory {{.RootDir}}>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog {{.LogsDir}}/errors.log
    CustomLog {{.LogsDir}}/access.log combined
</VirtualHost>

