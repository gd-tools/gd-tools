<VirtualHost *:80>
    ServerName {{.FQDN}}
    ServerAdmin {{.SysAdmin}}

    Redirect permanent / https://{{.FQDN}}/

    ErrorLog {{.LogsDir}}/http-errors.log
    CustomLog {{.LogsDir}}/http-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName {{.FQDN}}
    ServerAdmin {{.SysAdmin}}

    DocumentRoot {{.RootDir}}

    SSLEngine on
    SSLCertificateFile {{.CertDir}}/fullchain.pem
    SSLCertificateKeyFile {{.CertDir}}/privkey.pem

    <Directory {{.RootDir}}>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    ErrorLog {{.LogsDir}}/errors.log
    CustomLog {{.LogsDir}}/access.log combined
</VirtualHost>

