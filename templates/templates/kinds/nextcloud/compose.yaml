services:
  db:
    image: mariadb:10.6
    container_name: {{.ShortName}}-db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - {{.DataDir}}/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD={{.DBRootPass}}
      - MYSQL_PASSWORD={{.DBUserPass}}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    user: "{{.ToolsUID}}:{{.DockerGID}}"
    networks:
      - internal

  nextcloud:
    image: nextcloud:production
    container_name: {{.ShortName}}-app
    restart: always
    ports:
      - "{{.PortStr}}:80"
    volumes:
      - {{.DataDir}}/html:/var/www/html
    environment:
      - MYSQL_PASSWORD={{.DBUserPass}}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - NEXTCLOUD_ADMIN_USER=admin@{{.AdminDomain}}
      - NEXTCLOUD_ADMIN_EMAIL=admin@{{.AdminDomain}}
      - NEXTCLOUD_ADMIN_PASSWORD={{.AdminPass}}
      - SMTP_HOST=172.17.0.1
      - SMTP_PORT=25
      - SMTP_SECURE=off
      - SMTP_AUTHTYPE=none
      - MAIL_FROM_ADDRESS=admin
      - MAIL_DOMAIN={{.AdminDomain}}
    user: "{{.ToolsUID}}:{{.DockerGID}}"
    depends_on:
      - db
    networks:
      - internal

networks:
  internal:
    driver: bridge

