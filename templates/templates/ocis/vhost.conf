<VirtualHost *:80>
    ServerName {{.FQDN}}
    ServerAdmin {{.AdminEmail}}

    Redirect permanent / https://{{.FQDN}}/

    ErrorLog {{.LogsDir}}/http-error.log
    CustomLog {{.LogsDir}}/http-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName {{.FQDN}}
    ServerAdmin {{.AdminEmail}}

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto https
    RequestHeader set X-Forwarded-Host {{.FQDN}}
    AllowEncodedSlashes NoDecode

    ProxyPass        / http://127.0.0.1:9200/  retry=0 keepalive=On flushpackets=on
    ProxyPassReverse / http://127.0.0.1:9200/

    ProxyPassReverseCookieDomain 127.0.0.1 {{.FQDN}}
    ProxyPassReverseCookiePath   /         /

    Header always edit Set-Cookie "(?i)^((?:(?!;\\s?Secure).)*)$" "$1; Secure"
    Header always edit Set-Cookie "(?i)^((?:(?!;\\s?SameSite).)*)$" "$1; SameSite=None"

    <IfModule mod_headers.c>
        RequestHeader set Authorization   "expr=%{req:Authorization}"
        RequestHeader set OCS-APIREQUEST  "expr=%{req:OCS-APIREQUEST}"
        RequestHeader set Depth           "expr=%{req:Depth}"
        RequestHeader set Destination     "expr=%{req:Destination}"
        RequestHeader set Overwrite       "expr=%{req:Overwrite}"
        RequestHeader set Tus-Resumable   "expr=%{req:Tus-Resumable}"
    </IfModule>

    ErrorLog {{.LogsDir}}/errors.log
    CustomLog {{.LogsDir}}/access.log combined

    SetEnv proxy-sendchunked 1
    ProxyIOBufferSize 65536

    # Security Headers
    Header always set Strict-Transport-Security "max-age=15768000; includeSubDomains; preload"
    Header always set Referrer-Policy "no-referrer"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    SSLEngine on
    SSLCertificateFile {{.CertDir}}/fullchain.pem
    SSLCertificateKeyFile {{.CertDir}}/privkey.pem
</VirtualHost>

