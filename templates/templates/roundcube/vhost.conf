<VirtualHost *:80>
    ServerName {{.WebMail}}
    ServerAdmin {{.SysAdmin}}

    Redirect permanent / https://{{.WebMail}}/

    ErrorLog {{.LogsDir}}/http-errors.log
    CustomLog {{.LogsDir}}/http-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName {{.WebMail}}
    ServerAdmin {{.SysAdmin}}

    DocumentRoot {{.BaseDir}}
    DirectoryIndex index.php

    <Location /rspamd>
        Require all granted
    </Location>

    RedirectMatch 301 ^/spam-status$ /spam-status/
    ProxyPass        /spam-status/ http://127.0.0.1:11334/ upgrade=websocket
    ProxyPassReverse /spam-status/ http://127.0.0.1:11334/
    ProxyPassReverseCookiePath / /spam-status/
    ProxyPreserveHost On

    <Directory {{.BaseDir}}>
        Options +FollowSymLinks
        AllowOverride All
        Require all granted

        # Roundcube Rewrite Rules
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^/(.*)$ /index.php?_route=$1 [QSA,L]
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:{{.SocketPath}}|fcgi://localhost/"
    </FilesMatch>

    ErrorLog {{.LogsDir}}/errors.log
    CustomLog {{.LogsDir}}/access.log combined

    SSLEngine on
    SSLCertificateFile      {{.CertDir}}/fullchain.pem
    SSLCertificateKeyFile   {{.CertDir}}/privkey.pem
    Include /etc/apache2/conf-available/options-ssl-apache.conf
</VirtualHost>

