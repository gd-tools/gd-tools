<VirtualHost *:80>
{{- if .IsWWW}}
    ServerName  {{.DomainName}}
    ServerAlias {{.ServerAlias}}
{{else}}
    ServerName {{.FQDN}}
{{end}}
    Redirect permanent / http://{{.Destination}}
    ServerAdmin {{.AdminEmail}}

    ErrorLog {{.LogsDir}}/http-errors.log
    CustomLog {{.LogsDir}}/http-access.log combined
</VirtualHost>

<VirtualHost *:443>
{{- if .IsWWW}}
    ServerName  {{.DomainName}}
    ServerAlias {{.ServerAlias}}
{{else}}
    ServerName {{.FQDN}}
{{end}}
    Redirect permanent / https://{{.Destination}}
    ServerAdmin {{.AdminEmail}}

    ErrorLog {{.LogsDir}}/errors.log
    CustomLog {{.LogsDir}}/access.log combined

    SSLEngine on
    SSLCertificateFile {{.CertDir}}/fullchain.pem
    SSLCertificateKeyFile {{.CertDir}}/privkey.pem
</VirtualHost>

